# tradingdesk — EXAMPLE configuration.
# Copy this to `config.local.toml` and fill in your values.
# config.local.toml is git-ignored and must NEVER be committed (it holds account #s / keys).

[broker]
# Which broker adapter to use: robinhood | ibkr | futu
active = "robinhood"

[broker.robinhood]
# The ONLY account the desk may trade. Read from here — never hardcoded in code or docs.
account_number = "YOUR_ACCOUNT_NUMBER"
# Optional named watchlists to scan. Map a label to your connector's watchlist id.
# [broker.robinhood.watchlists]
# "My List" = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"

[broker.ibkr]
# TWS / IB Gateway connection (adapter is a stub for now — contributions welcome).
host = "127.0.0.1"
port = 7497
client_id = 1
account_id = "YOUR_IBKR_ACCOUNT"

[broker.futu]
# FutuOpenD gateway (adapter is a stub for now — contributions welcome).
host = "127.0.0.1"
port = 11111
account_id = "YOUR_FUTU_ACCOUNT"

[llm]
# Only used by the OPTIONAL autonomous runner. The default agent-driven mode needs no key here —
# your agent (Claude Code / Codex / etc.) supplies the reasoning.
provider = "anthropic"        # anthropic | openai | ...
model = "claude-opus-4-8"
# Put the actual API key in the environment (.env), not in this file.

[paths]
journal = "journal"
reports = "reports"
private_refs = "references/private"   # optional bring-your-own overlay (git-ignored)
